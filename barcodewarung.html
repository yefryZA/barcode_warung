<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBS STOCK GOLD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'sans-serif'; }
        
        /* Kartu Efek Kaca */
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(212, 175, 55, 0.3); /* Border Emas Tipis */
            border-radius: 1.5rem;
        }

        /* Border Emas Tegas */
        .border-gold {
            border: 2px solid #D4AF37 !important;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        /* Tombol Emas */
        .btn-gold {
            background: linear-gradient(135deg, #D4AF37 0%, #996515 100%);
            color: #000; /* Tulisan hitam biar kebaca di warna emas */
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        /* Khusus Stok Tipis Tetap Merah */
        .border-danger {
            border: 2px solid #ef4444 !important;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body class="p-5">

    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-bold text-[#D4AF37]">BBS GOLD STOCK</h1>
            <p class="text-[10px] tracking-[0.2em] text-gray-400">PREMIUM INVENTORY SYSTEM</p>
        </div>
        <div class="w-12 h-12 glass-card border-gold flex items-center justify-center text-[#D4AF37]">
            <i class="fa-solid fa-crown"></i>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="glass-card border-gold p-4 text-center">
            <p class="text-gray-400 text-[10px] uppercase mb-1">Total Nilai Aset</p>
            <h2 id="total-aset-display" class="text-lg font-extrabold text-[#D4AF37]">Rp 0</h2>
        </div>
        <div class="glass-card border-danger p-4 text-center bg-red-500/5">
            <p class="text-red-400 text-[10px] uppercase mb-1 font-bold">Stok Menipis</p>
            <h2 id="stok-tipis-display" class="text-lg font-extrabold text-red-500">0 Item</h2>
        </div>
    </div>

    <div class="space-y-5">
        
        <button onclick="bukaScan('masuk')" class="w-full btn-gold p-6 rounded-[2rem] flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-black/20 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-plus text-xl"></i>
                </div>
                <div class="text-left">
                    <span class="block font-black text-lg uppercase leading-tight text-black">Stok Masuk</span>
                    <span class="text-[10px] font-bold opacity-60">TAMBAH BARANG GUDANG</span>
                </div>
            </div>
            <i class="fa-solid fa-barcode text-2xl text-black/50"></i>
        </button>

        <button onclick="bukaScan('jual')" class="w-full glass-card border-gold p-6 flex items-center justify-between group active:scale-95 transition-all">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-[#D4AF37]/10 rounded-full flex items-center justify-center border border-[#D4AF37]/30">
                    <i class="fa-solid fa-cart-shopping text-xl text-[#D4AF37]"></i>
                </div>
                <div class="text-left">
                    <span class="block font-bold text-lg text-white">Kasir Penjualan</span>
                    <span class="text-[10px] text-gray-400 uppercase">Input Transaksi Keluar</span>
                </div>
            </div>
            <i class="fa-solid fa-chevron-right text-[#D4AF37]"></i>
        </button>

        <button onclick="lihatStok()" class="w-full glass-card border-gold p-6 flex items-center justify-between group active:scale-95 transition-all">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gray-500/10 rounded-full flex items-center justify-center border border-gray-500/30">
                    <i class="fa-solid fa-database text-xl text-gray-400"></i>
                </div>
                <div class="text-left">
                    <span class="block font-bold text-lg text-white">Data Master</span>
                    <span class="text-[10px] text-gray-400 uppercase">Cek Stok & Atur Harga</span>
                </div>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-500"></i>
        </button>

    </div>

    <div class="mt-8 glass-card border-gold p-4 flex items-center justify-between bg-[#D4AF37]/5">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-chart-line text-[#D4AF37]"></i>
            <span class="text-xs font-bold uppercase">Estimasi Margin Hari Ini</span>
        </div>
        <span class="text-[#D4AF37] font-black italic">Rp 450.000</span>
    </div>

    <div class="mt-12 text-center">
        <p class="text-[9px] tracking-[0.4em] text-gray-600 font-bold">PT. BBS LOGISTIK DIGITAL</p>
    </div>

    <div id="modal-scan" class="fixed inset-0 bg-black/90 z-50 hidden flex flex-col p-5">
    <div class="flex justify-between items-center mb-5">
        <h2 id="judul-scan" class="text-xl font-bold text-[#D4AF37]">SCAN BARCODE</h2>
        <button onclick="tutupScan()" class="text-white text-2xl">&times;</button>
    </div>

    <div id="reader" class="w-full overflow-hidden rounded-2xl border-2 border-gold bg-black"></div>
    
    <div class="mt-5 text-center">
        <p class="text-gray-400 text-sm italic">Pastikan barcode berada di tengah kotak</p>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script type="module">
    // 1. Import Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getDatabase, ref, set, get, update, onValue 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 2. Config
    const firebaseConfig = {
        apiKey: "AIzaSyA_wvEsCCOEjiwxui7_pdOrG8-xMBCw3mw",
        authDomain: "barcode-warung-81e97.firebaseapp.com",
        projectId: "barcode-warung-81e97",
        storageBucket: "barcode-warung-81e97.firebasestorage.app",
        messagingSenderId: "1089837830503",
        appId: "1:1089837830503:web:410644c17a04314e37dfc2",
        measurementId: "G-92V3E8BM6J"
    };

    // 3. Init
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app, "https://barcode-warung-81e97-default-rtdb.asia-southeast1.firebasedatabase.app/");

    let html5QrCode;

    // --- DAFTARKAN KE WINDOW SUPAYA TOMBOL BISA KLIK ---
    window.bukaScan = function(mode) {
        document.getElementById('modal-scan').classList.remove('hidden');
        document.getElementById('judul-scan').innerText = "SCAN: " + mode.toUpperCase();
        
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 150 } };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                window.tutupScan(); // Pakai window.
                prosesBarang(decodedText, mode);
            }
        ).catch((err) => {
            alert("Kamera Error: " + err);
        });
    }

    window.tutupScan = function() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                document.getElementById('modal-scan').classList.add('hidden');
                html5QrCode.clear(); // Bersihkan memori kamera
            });
        } else {
            document.getElementById('modal-scan').classList.add('hidden');
        }
    }

    // --- LOGIKA DATABASE ---
    async function prosesBarang(barcode, mode) {
        const barangRef = ref(db, `stok_barang/${barcode}`);
        const snapshot = await get(barangRef);
        const data = snapshot.val();

        if (data) {
            let pesan = mode === 'masuk' ? "Tambah Stok Baru:" : "Jumlah Penjualan:";
            let qty = prompt(`Barang: ${data.nama}\nStok Sekarang: ${data.stok}\n\n${pesan}`, "1");
            
            if (qty && !isNaN(qty)) {
                let jumlah = parseInt(qty);
                let stokBaru = mode === 'masuk' ? (data.stok + jumlah) : (data.stok - jumlah);
                
                if (stokBaru < 0) {
                    alert("Waduh Bang, Stok Nggak Cukup!");
                    return;
                }

                await update(barangRef, { stok: stokBaru });
                alert(`Berhasil! Stok ${data.nama} sekarang: ${stokBaru}`);
                // location.reload(); // Tidak perlu reload karena onValue akan update otomatis
            }
        } else {
            if (mode === 'jual') {
                alert("Barang Belum Terdaftar! Silahkan Scan di Menu 'Stok Masuk' dulu.");
                return;
            }

            alert("Barang Baru Terdeteksi! Silahkan Lengkapi Data.");
            let nama = prompt("Nama Barang:");
            let hBeli = prompt("Harga Modal (Rp):", "0");
            let hJual = prompt("Harga Jual (Rp):", "0");
            let stokAwal = prompt("Stok Awal:", "1");
            let limit = prompt("Peringatan Stok Menipis di angka:", "5");

            if (nama && hBeli && hJual) {
                await set(barangRef, {
                    nama: nama,
                    hargaBeli: parseInt(hBeli),
                    hargaJual: parseInt(hJual),
                    stok: parseInt(stokAwal),
                    minStok: parseInt(limit)
                });
                alert("Barang Berhasil Didaftarkan!");
            }
        }
    }

    // --- REALTIME UPDATE DASHBOARD ---
    onValue(ref(db, 'stok_barang'), (snapshot) => {
        let totalAset = 0;
        let tipisCount = 0;
        const items = snapshot.val();

        if (items) {
            Object.values(items).forEach(item => {
                totalAset += (item.stok * (item.hargaBeli || 0));
                if (item.stok <= (item.minStok || 0)) {
                    tipisCount++;
                }
            });
        }

        document.getElementById('total-aset-display').innerText = "Rp " + totalAset.toLocaleString();
        document.getElementById('stok-tipis-display').innerText = tipisCount + " Item";
    });
</script>
</body>
</html>
